<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="60" y1="380" x2="452" y2="380" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <line x1="60" y1="310" x2="452" y2="310" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="60" y1="240" x2="452" y2="240" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Bar chart: 4 bars with rising trend -->
  <!-- Bar 1 (D - low) -->
  <rect x="72" y="310" width="64" height="70" rx="10" fill="rgba(255,255,255,0.25)"/>
  <!-- Bar 2 (B) -->
  <rect x="164" y="255" width="64" height="125" rx="10" fill="rgba(255,255,255,0.45)"/>
  <!-- Bar 3 (A-) -->
  <rect x="256" y="200" width="64" height="180" rx="10" fill="rgba(255,255,255,0.70)"/>
  <!-- Bar 4 (A+ - tallest, full white) -->
  <rect x="348" y="140" width="64" height="240" rx="10" fill="white" filter="url(#glow)"/>

  <!-- Trend line connecting tops -->
  <polyline points="104,310 196,255 288,200 380,140"
    fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3" stroke-dasharray="6 4" stroke-linecap="round"/>

  <!-- Rising dots on top of bars -->
  <circle cx="380" cy="140" r="8" fill="white" opacity="0.9"/>

  <!-- Base line -->
  <rect x="60" y="378" width="392" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>

  <!-- "GPA" label at bottom -->
  <text x="256" y="462" text-anchor="middle"
    fill="white" font-size="58" font-weight="800" letter-spacing="10"
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif"
    opacity="0.95">GPA</text>
</svg>
